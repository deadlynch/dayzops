name: CI

# Roda em PRs e nos pushes para os branches principais (GitFlow).
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  # Suíte de testes num checkout LIMPO, na matriz de versões suportadas.
  # Pega arquivo novo que ficou de fora do commit, símbolo que sumiu de um
  # módulo (ex.: troca de arquivos) e qualquer regressão de lógica.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar pacote e dependências de teste
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Smoke de imports (falha rápido se um módulo não importa)
        run: |
          python - <<'PY'
          import importlib, pkgutil
          import dayzops
          # importa todos os submódulos do pacote
          for m in pkgutil.iter_modules(dayzops.__path__, "dayzops."):
              importlib.import_module(m.name)
          # garante os símbolos públicos de que o instalador e a CLI dependem
          from dayzops.systemd import generate_units, ServerControl
          from dayzops.steamcmd import SteamCmd
          from dayzops.cli import main
          print("imports ok")
          PY

      - name: Rodar a suíte
        run: python -m pytest -q

  # Integridade dos scripts: presença, bit de execução, sintaxe e shellcheck.
  # Pega o que o pytest não vê — script ausente ou sem +x.
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scripts precisam estar versionados e executáveis
        run: |
          for f in bin/dayzops scripts/install.sh scripts/uninstall.sh; do
            if [ ! -f "$f" ]; then
              echo "::error::$f não está no repositório"
              exit 1
            fi
            if [ ! -x "$f" ]; then
              echo "::error::$f não tem bit de execução (use: git update-index --chmod=+x $f)"
              exit 1
            fi
          done

      - name: Sintaxe dos shell scripts
        run: |
          bash -n bin/dayzops
          bash -n scripts/install.sh
          bash -n scripts/uninstall.sh

      - name: Shellcheck (bloqueia em warning ou acima)
        run: shellcheck --severity=warning scripts/install.sh scripts/uninstall.sh bin/dayzops
